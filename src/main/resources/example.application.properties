# Database
db.url=
db.username=
db.password=
db.driver=com.mysql.cj.jdbc.Driver

# Shared Hikari defaults for plain JDBC and Hibernate
hikari.minimumIdle=2
hikari.maximumPoolSize=10
hikari.idleTimeout=30000
hikari.connectionTimeout=20000
hikari.maxLifetime=1800000
hikari.poolName=SouvenirJdbcPool

# Hibernate can override the shared Hikari values when needed
hibernate.hikari.poolName=SouvenirHibernatePool


# Cloudinary
cloud_name=
cloud_api_key= 
cloud_api_secret=

# Google AuthO
app_mail=
app_password=

# VNPAY Sandbox
vnpay.tmnCode=YOUR_TMN_CODE
vnpay.hashSecret=YOUR_HASH_SECRET
vnpay.payUrl=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
# Optional. Leave blank to derive it from the current request.
vnpay.returnUrl=
